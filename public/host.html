<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jeopardy Host</title>
<link rel="stylesheet" href="/assets/host.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="host-wrapper">

    <div class="host-controls">
        <h1>JEOPARDY HOST</h1>

        <div class="controls">
            <button class="btn" onclick="socket.emit('newGame')">Neues Game</button>
            <button class="btn btn-danger" onclick="socket.emit('closeGame')">Game schließen</button>
        </div>

        <div class="json-upload">
            <h2>Board JSON</h2>
            <input type="file" id="jsonFile" accept=".json">
            <button class="btn" onclick="uploadJSON()">Upload</button>
        </div>
    </div>

    <div class="mini-board">
        <h2>Board Status</h2>
        <div id="miniBoard" class="board-grid"></div>
    </div>

    <div id="playerControls" class="player-controls"></div>

</div>

<div id="questionBox" class="question-overlay hidden">
    <h3 id="qCategory"></h3>
    <h4 id="qPoints"></h4>
    <p id="qText"></p>
    <p id="qAnswer"></p>
    <div class="controls">
        <button class="btn" onclick="revealAnswerOnScreen()">Antwort anzeigen</button>
        <button class="btn" onclick="markAnswer(true)">Richtig</button>
        <button class="btn btn-danger" onclick="markAnswer(false)">Falsch</button>
        <button class="btn" onclick="resetQuestion()">Zurücksetzen</button>
    </div>
</div>

<div class="buzzer-status">
    <h2 id="buzzerInfo">Buzzer: frei</h2>
    <button class="btn" onclick="unlockBuzzer()">Buzzer freigeben</button>
</div>

<div class="board-manager">
  <h2>Boards</h2>
  <ul id="boardList"></ul>

  <input id="boardName" placeholder="Board-Name">
  <button onclick="saveCurrentBoard()">Aktuelles Board speichern</button>
</div>


<script src="/src/host.js"></script>
</body>
</html>
