<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Screen</title>
    <link rel="stylesheet" href="/assets/screen.css">
</head>
<body>

<div class="screen">
    <div class="row">
        <div class="board-wrapper">
            
            <div class="title-container">
                <img src="/assets/titel.png" alt="Jeopardy" class="title-image">
            </div>

            
            <div class="board" id="boardContainer">
            </div>

            <div id="questionOverlay" class="overlay hidden">
                <div class="question-box">
                    <div class="question-container">
                        <h2 id="qCategory"></h2>
                        <p id="qPoints"></p>
                        <p id="qQuestion"></p>
                    </div>
                    <div id="qAnswer" class="answer-box hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM CAMS -->
    <div class="bottom-cams">
        <div class="cam-wrapper">
            <div class="name-slot">Player 1</div>
            <div class="cam"></div>
            <div class="player-score" id="score1">Punkte: 0</div>
        </div>

        <div class="cam-wrapper">
            <div class="name-slot">Player 2</div>
            <div class="cam"></div>
            <div class="player-score" id="score2">Punkte: 0</div>
        </div>

        <div class="cam-wrapper">
            <div class="name-slot">Host</div>
            <div class="cam host-cam"></div>
            <div class="player-score" id="scoreHost"></div>
        </div>

        <div class="cam-wrapper">
            <div class="name-slot">Player 3</div>
            <div class="cam"></div>
            <div class="player-score" id="score3">Punkte: 0</div>
        </div>

        <div class="cam-wrapper">
            <div class="name-slot">Player 4</div>
            <div class="cam"></div>
            <div class="player-score" id="score4">Punkte: 0</div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/src/screen.js"></script>
</body>
</html>
