<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jeopardy Host</title>
<link rel="stylesheet" href="/assets/host.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="host-wrapper">

    <div class="host-controls">
        <h1>JEOPARDY HOST</h1>

        <div class="controls">
            <button class="btn" onclick="socket.emit('newGame')">Neues Game</button>
            <button class="btn btn-danger" onclick="socket.emit('closeGame')">Game schließen</button>
        </div>

        <div class="players">
            <h2>Players</h2>
            <ul id="playerList"></ul>
        </div>

        <div class="json-upload">
            <h2>Board JSON</h2>
            <input type="file" id="jsonFile" accept=".json">
            <button class="btn" onclick="uploadJSON()">Upload</button>
        </div>
    </div>

    <div class="mini-board">
        <h2>Board Status</h2>
        <div id="miniBoard" class="board-grid"></div>
    </div>

</div>

<div id="questionContainer" class="question-overlay">
    <h3 id="qCategory"></h3>
    <h4 id="qPoints"></h4>
    <p id="qText"></p>
    <p id="qAnswer"></p>
    <div class="controls">
        <button class="btn" onclick="markAnswer(true)">Richtig</button>
        <button class="btn btn-danger" onclick="markAnswer(false)">Falsch</button>
        <button class="btn" onclick="resetQuestion()">Zurücksetzen</button>
    </div>
</div>

<script>
const socket = io();
let players = [];
let boardState = [];
let currentCell = null;

function renderPlayers() {
    const ul = document.getElementById("playerList");
    ul.innerHTML = "";
    players.forEach(p => {
        ul.innerHTML += `
            <li>
                ${p.name} – ${p.score}
                <button onclick="socket.emit('updateScore',{playerId:${p.id},delta:100})">+100</button>
                <button onclick="socket.emit('updateScore',{playerId:${p.id},delta:-100})">-100</button>
            </li>`;
    });
}

function renderBoard() {
    const board = document.getElementById("miniBoard");
    board.innerHTML = "";
    boardState.forEach(col => {
        const c = document.createElement("div");
        c.className = "board-column";
        col.forEach(cell => {
            const d = document.createElement("div");
            d.className = "mini-cell " + cell.status;
            d.textContent = cell.points;
            d.onclick = () => {
                if (cell.status === "available") {
                    currentCell = cell;
                    socket.emit("hostSelectQuestion", cell);
                }
            };
            c.appendChild(d);
        });
        board.appendChild(c);
    });
}

function openQuestion(q) {
    document.getElementById("qCategory").textContent = q.category;
    document.getElementById("qPoints").textContent = q.points;
    document.getElementById("qText").textContent = q.question;
    document.getElementById("qAnswer").textContent = "Antwort: " + q.answer;
    document.getElementById("questionContainer").style.display = "block";
}

function markAnswer(correct) {
    socket.emit("hostAnswer", { correct });
    document.getElementById("questionContainer").style.display = "none";
}

function resetQuestion() {
    socket.emit("resetQuestion", currentCell);
    document.getElementById("questionContainer").style.display = "none";
}

function uploadJSON() {
    const file = document.getElementById("jsonFile").files[0];
    if (!file) return alert("Keine Datei gewählt");

    const reader = new FileReader();
    reader.onload = e => {
        socket.emit("uploadBoardJSON", JSON.parse(e.target.result));
    };
    reader.readAsText(file);
}

socket.on("gameState", data => {
    players = data.players;
    boardState = data.boardState;
    renderPlayers();
    renderBoard();
    if (data.currentQuestion?.isOpen) openQuestion(data.currentQuestion);
});

socket.on("playersUpdate", p => {
    players = p;
    renderPlayers();
});

socket.on("showQuestion", openQuestion);

socket.emit("requestGameState");
</script>

</body>
</html>
