<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Manager</title>
    <link rel="stylesheet" href="assets/manager.css">
</head>
<body>
    <h1>Jeopardy Manager</h1>
    <div class="manager-wrapper">
        <div id="upload-section" class="upload-section">
            <h2>Upload JSON Board</h2>
            <input type="file" id="file-input" accept="application/json">
            <button id="upload-button">Upload</button>
        </div>
        <div id="boards-list" class="boards-list">
            <h2>Uploaded Boards</h2>
            <ul id="boards"></ul>
        </div>
        <div id="questionBox" class="question-overlay hidden">
            <h3 id="qCategory"></h3>
            <h4 id="qPoints"></h4>
            <p id="qText"></p>
            <p id="qAnswer"></p>
        </div>
        <div id="board-details">
            <h2>Board Details</h2>
            <button id="create-blank-board">Leeres Board erstellen</button>
            <div id="board-editor" style="display: none;">
                <h3>Frage bearbeiten</h3>
                <label for="category-select">Kategorie:</label>
                <select id="category-select"></select>

                <label for="points-select">Punkte:</label>
                <select id="points-select"></select>

                <label for="question-input">Frage:</label>
                <textarea id="question-input"></textarea>

                <label for="answer-input">Antwort:</label>
                <textarea id="answer-input"></textarea>

                <label for="media-input">Medien hinzufügen:</label>

                <label for="spotify-input" style="display:block;margin-top:6px;">Spotify-Link (Musik):</label>
                <input
                    type="url"
                    id="spotify-input"
                    placeholder="https://open.spotify.com/track/..."
                    style="width:100%;margin-bottom:8px;"
                />

                <button id="add-image">Bild hinzufügen</button>


                <button id="save-question">Speichern</button>
            </div>
        </div>
    </div>
    <script src="src/manager.js"></script>
</body>
</html>
