<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Screen</title>
    <link rel="stylesheet" href="/assets/screen.css">
</head>
<body>

<div class="screen">
    <div class="row">


        <!-- BOARD -->
        <div class="board-wrapper">
            <h1 class="title">Git Gud Senpai</h1>
            <div class="board" id="boardContainer">
                <!-- Kategorien & Zellen werden dynamisch geladen -->
            </div>

            <div id="questionOverlay" class="overlay hidden">
                <div class="question-box">
                    <div class="question-container">
                        <h2 id="qCategory"></h2>
                        <p id="qPoints"></p>
                        <p id="qQuestion"></p>
                    </div>
                    <div id="qAnswer" class="answer-box hidden"></div>
                </div>
            </div>
        </div>

        <!-- Untere Cam-Reihe -->
        <div class="bottom-cams">
            <div class="cam" id="cam1-bottom"></div>
            <div class="cam" id="cam2-bottom"></div>
            <div class="cam host-cam" id="host-cam-bottom"></div>
            <div class="cam" id="cam3-bottom"></div>
            <div class="cam" id="cam4-bottom"></div>
        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/src/screen.js"></script>
</body>
</html>
