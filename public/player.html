<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Player</title>
    <link rel="stylesheet" href="/assets/player.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="player-root">

    <!-- LINKe SEITE: BOARD -->
    <div class="player-board">
        <div id="boardContainer" class="board"></div>
    </div>

    <!-- RECHTE SEITE: FRAGE / ANTWORT / BUZZ -->
    <div class="player-action">

        <h1 id="playerName">Spieler</h1>

        <div class="qa-box">
            <div class="question">
                <h2 id="qCategory"></h2>
                <h3 id="qPoints"></h3>
                <p id="qQuestion">Warte auf Frage…</p>
            </div>

            <div class="answer hidden" id="qAnswer"></div>
        </div>

        <button id="buzzBtn">BUZZ!</button>
        <div id="buzzInfo" class="hidden">Buzzer gesperrt</div>

    </div>

</div>

<script src="/src/player.js"></script>
</body>
</html>
