<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Screen</title>
    <link rel="stylesheet" href="/assets/screen.css">
</head>
<body>

<div class="screen-wrapper">

    <!-- JEOPARDY BOARD OBEN MITTEN -->
    <div class="board-container">
        <h1 class="title">JEOPARDY</h1>
        <div class="board">
            <div class="category">CATEGORY 1</div>
            <div class="category">CATEGORY 2</div>
            <div class="category">CATEGORY 3</div>
            <div class="category">CATEGORY 4</div>
            <div class="category">CATEGORY 5</div>

            <div class="cell">100</div>
            <div class="cell">100</div>
            <div class="cell">100</div>
            <div class="cell">100</div>
            <div class="cell">100</div>

            <div class="cell">200</div>
            <div class="cell">200</div>
            <div class="cell">200</div>
            <div class="cell">200</div>
            <div class="cell">200</div>

            <div class="cell">300</div>
            <div class="cell">300</div>
            <div class="cell">300</div>
            <div class="cell">300</div>
            <div class="cell">300</div>

            <div class="cell">400</div>
            <div class="cell">400</div>
            <div class="cell">400</div>
            <div class="cell">400</div>
            <div class="cell">400</div>

            <div class="cell">500</div>
            <div class="cell">500</div>
            <div class="cell">500</div>
            <div class="cell">500</div>
            <div class="cell">500</div>
        </div>
    </div>

    <!-- UNTERER BEREICH: Chat links, Cams rechts -->
    <div class="bottom-panel">
        <!-- Chat links -->
        <div class="chat-placeholder">
            <p></p>
        </div>

        <!-- Cams rechts -->
        <div class="cams-container">
            <div class="cam-block">
                <div class="cam-placeholder"><p>CAM 1</p></div>
                <div class="score"><p>0</p></div>
            </div>

            <div class="cam-block">
                <div class="cam-placeholder"><p>CAM 2</p></div>
                <div class="score"><p>0</p></div>
            </div>

            <div class="cam-block">
                <div class="cam-placeholder"><p>CAM 3</p></div>
                <div class="score"><p>0</p></div>
            </div>

            <div class="cam-block">
                <div class="cam-placeholder"><p>CAM 4</p></div>
                <div class="score"><p>0</p></div>
            </div>
            
        </div>

</body>
</html>
